{% extends 'catalogo/base.html' %}

{% block contenido %}

<style>
    .login-container {
        max-width: 400px;
        margin: 60px auto;
        background: #1e293b;
        padding: 35px;
        border-radius: 15px;
        box-shadow: 0 0 20px rgba(0,0,0,0.4);
    }

    .login-container h2 {
        text-align: center;
        color: #38bdf8;
        margin-bottom: 25px;
    }

    .login-container form {
        display: flex;
        flex-direction: column;
        gap: 15px;
    }

    .login-container input {
        padding: 12px;
        border: none;
        border-radius: 8px;
    }

    .login-container button {
        padding: 12px;
        background: #38bdf8;
        border: none;
        border-radius: 8px;
        color: #020617;
        font-weight: bold;
        cursor: pointer;
    }

    .login-container button:hover {
        background: #0ea5e9;
    }

    .login-container p {
        text-align: center;
        margin-top: 15px;
    }

    .login-container a {
        color: #38bdf8;
        text-decoration: none;
    }
</style>

<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>

    <p>¿No tenés cuenta? <a href="{% url 'registro' %}">Registrate</a></p>
</div>

{% endblock %}
