{% extends 'catalogo/base.html' %}

{% block contenido %}

<div class="login-container">
    <h2>Iniciar Sesión</h2>

    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit">Entrar</button>
    </form>

    <p>¿No tenés cuenta? <a href="{% url 'registro' %}">Registrate</a></p>
</div>

{% endblock %}
